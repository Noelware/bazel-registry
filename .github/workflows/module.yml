name: CI / Modules
on:
    pull_request:
        types:
            - opened
            - synchronize
            - ready_for_review
jobs:
    validate-module:
        name: "Validate [Bazel v${{matrix.bazel}}]"
        runs-on: ubuntu-latest
        outputs:
            modules: ${{steps.modified.outputs.modules}}
            has-changes: ${{steps.modified.outputs.has_changes}}
        strategy:
            fail-fast: true
            matrix:
                bazel: ["7.7.1", "8.6.0", "9.0.1"]
        steps:
            - uses: actions/checkout@v6
              with:
                submodules: recursive
                fetch-depth: 0
            - uses: actions/cache@v5
              with:
                key: bazel-cache-${{matrix.bazel}}
                restore-keys: bazel-cache-
                path: |
                    ~/.cache/bazel
                    ~/.cache/bazelisk
            - run: .ci/validate-modified.sh
              id: modified
